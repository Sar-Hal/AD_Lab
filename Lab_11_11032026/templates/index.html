<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MNIST Digit Recognizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        .draw-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        h1 { font-size: 1.6rem; margin-bottom: 8px; color: #e94560; }
        canvas {
            border: 2px solid #e94560;
            border-radius: 8px;
            cursor: crosshair;
            image-rendering: pixelated;
        }
        #drawCanvas { background: #000; }
        .preview-row {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.85rem;
            color: #aaa;
        }
        #previewCanvas {
            border: 1px solid #555;
            border-radius: 4px;
            background: #000;
        }
        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-clear { background: #e94560; color: #fff; }
        .btn-clear:hover { background: #c73650; }
        .result-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            min-width: 260px;
        }
        .prediction-box {
            font-size: 7rem;
            font-weight: bold;
            color: #e94560;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #333;
            border-radius: 16px;
            background: #16213e;
        }
        .confidence {
            font-size: 1.1rem;
            color: #aaa;
        }
        .bar-chart {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .bar-label { width: 16px; text-align: right; color: #aaa; }
        .bar-track {
            flex: 1;
            height: 16px;
            background: #16213e;
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: #e94560;
            border-radius: 4px;
            transition: width 0.2s;
        }
        .bar-val { width: 44px; font-size: 0.75rem; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="draw-section">
            <h1>Draw a Digit (0-9)</h1>
            <canvas id="drawCanvas" width="280" height="280"></canvas>
            <div class="preview-row">
                <span>28&times;28 preview:</span>
                <canvas id="previewCanvas" width="28" height="28"></canvas>
            </div>
            <button class="btn btn-clear" onclick="clearCanvas()">Clear</button>
        </div>
        <div class="result-section">
            <h1>Prediction</h1>
            <div class="prediction-box" id="predDigit">-</div>
            <div class="confidence" id="predConf"></div>
            <div class="bar-chart" id="barChart"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        const preview = document.getElementById('previewCanvas');
        const preCtx = preview.getContext('2d');
        let drawing = false;
        let predTimer = null;

        // Init bar chart
        const barChart = document.getElementById('barChart');
        for (let i = 0; i < 10; i++) {
            barChart.innerHTML += `
                <div class="bar-row">
                    <span class="bar-label">${i}</span>
                    <div class="bar-track"><div class="bar-fill" id="bar${i}" style="width:0%"></div></div>
                    <span class="bar-val" id="val${i}">0%</span>
                </div>`;
        }

        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 280, 280);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 18;

        canvas.addEventListener('mousedown', e => { drawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
        canvas.addEventListener('mousemove', e => { if (!drawing) return; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); schedulePrediction(); });
        canvas.addEventListener('mouseup', () => { drawing = false; schedulePrediction(); });
        canvas.addEventListener('mouseleave', () => { drawing = false; });

        // Touch support
        canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const t = e.touches[0]; const r = canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(t.clientX - r.left, t.clientY - r.top); });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if (!drawing) return; const t = e.touches[0]; const r = canvas.getBoundingClientRect(); ctx.lineTo(t.clientX - r.left, t.clientY - r.top); ctx.stroke(); schedulePrediction(); });
        canvas.addEventListener('touchend', e => { e.preventDefault(); drawing = false; schedulePrediction(); });

        function schedulePrediction() {
            clearTimeout(predTimer);
            predTimer = setTimeout(predict, 150);
        }

        function updatePreview() {
            preCtx.clearRect(0, 0, 28, 28);
            preCtx.drawImage(canvas, 0, 0, 28, 28);
        }

        async function predict() {
            updatePreview();
            const dataURL = preview.toDataURL('image/png');
            try {
                const res = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: dataURL })
                });
                const data = await res.json();
                if (data.error) return;
                document.getElementById('predDigit').textContent = data.prediction;
                document.getElementById('predConf').textContent = `Confidence: ${data.confidence}%`;
                for (let i = 0; i < 10; i++) {
                    document.getElementById('bar' + i).style.width = data.probabilities[i] + '%';
                    document.getElementById('val' + i).textContent = data.probabilities[i] + '%';
                }
            } catch (e) { /* ignore fetch errors while drawing */ }
        }

        function clearCanvas() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 280, 280);
            preCtx.clearRect(0, 0, 28, 28);
            document.getElementById('predDigit').textContent = '-';
            document.getElementById('predConf').textContent = '';
            for (let i = 0; i < 10; i++) {
                document.getElementById('bar' + i).style.width = '0%';
                document.getElementById('val' + i).textContent = '0%';
            }
        }
    </script>
</body>
</html>
